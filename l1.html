<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de profil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* BASE MOBILE-FIRST */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --c1:#3C3489;--c1l:#EEEDFE;
  --c2:#085041;--c2l:#E1F5EE;--c2m:#5DCAA5;
  --c3:#633806;--c3l:#FAEEDA;--c3m:#EF9F27;
  --c4:#712B13;--c4l:#FAECE7;--c4m:#F0997B;
  --c5:#0C447C;--c5l:#E6F1FB;--c5m:#85B7EB;
  --dark:#1A2744;
  --border:#e0e0e0;--muted:#888;--text:#1a1a1a;--bg:#f6f6f4;
  --nav-h:56px;--tab-h:64px;
}
html,body{min-height:100%;background:var(--bg);font-family:system-ui,-apple-system,sans-serif;color:var(--text);}

/* NAV TOP */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:50;height:var(--nav-h);background:var(--dark);display:flex;align-items:center;gap:10px;padding:0 16px;}
.top-nav-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;padding:4px;}
.top-nav-title{font-size:14px;font-weight:500;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-nav-pdf{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:12px;padding:6px 12px;border-radius:16px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;}

/* SCROLL BODY */
.page-body{margin-top:var(--nav-h);padding:16px;padding-bottom:calc(var(--tab-h)+16px);max-width:600px;margin-left:auto;margin-right:auto;}
.page-body.no-tab{padding-bottom:24px;}

/* STEP NAV */
.step-nav{display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.step-dot{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#888;flex-shrink:0;}
.step-dot.active{background:var(--accent,#3C3489);color:#fff;border-color:var(--accent,#3C3489);}
.step-dot.done{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.step-line{flex:1;height:1px;background:var(--border);min-width:12px;}

/* CARDS */
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:0.5px solid var(--border);}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}

/* SECTION LABEL */
.slabel{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:16px;display:block;}

/* FIELD */
.field{margin-bottom:14px;}
.field label{font-size:13px;color:#555;margin-bottom:6px;display:block;line-height:1.4;}
.field input,.field textarea,.field select{
  width:100%;font-size:16px;padding:11px 14px;
  border:1px solid var(--border);border-radius:10px;
  background:#fff;color:var(--text);
  -webkit-appearance:none;appearance:none;
}
.field textarea{resize:vertical;min-height:72px;line-height:1.5;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent,#3C3489);}

/* PILLS (radio) */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.pill{padding:8px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:#fff;color:var(--text);transition:background .12s;-webkit-tap-highlight-color:transparent;}
.pill.sel{background:var(--accent-l,#EEEDFE);color:var(--accent,#3C3489);border-color:var(--accent,#3C3489);}

/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-size:14px;padding:12px 20px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.btn.pri{background:var(--accent,#3C3489);color:#fff;border-color:var(--accent,#3C3489);flex:1;}
.btn.sec{background:#fff;flex-shrink:0;}
.btn.pdf{background:var(--accent-l,#EEEDFE);color:var(--accent,#3C3489);border-color:var(--accent,#3C3489);flex:1;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;}

/* GRID 2 col */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:480px){.grid4{grid-template-columns:repeat(4,1fr);}}

/* RESULT TABLE → stacked on mobile */
.result-table{width:100%;border-collapse:collapse;}
.result-table th{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);background:#f6f6f4;}
.result-table td{padding:10px 12px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:top;}
.result-table tr:last-child td{border-bottom:none;}

/* COUNTER */
.counter{font-size:12px;color:var(--muted);margin-bottom:10px;}
.counter span{font-weight:600;color:var(--accent,#3C3489);}

/* HEADER RESULT */
.result-header{background:var(--accent-l,#EEEDFE);border-radius:12px;padding:16px;margin-bottom:16px;}
.result-header .rh-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.result-header .rh-name{font-size:18px;font-weight:600;color:var(--accent,#3C3489);}
.result-header .rh-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* PROGRESS BAR */
.pbar-wrap{margin-bottom:10px;}
.pbar-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px;}
.pbar-track{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s;}

/* PANEL */
.panel{display:none;}
.panel.active{display:block;}

/* MISC */
.alert-box{border-radius:10px;padding:12px 14px;font-size:13px;display:flex;align-items:flex-start;gap:8px;margin-top:6px;}
.alert-box i{font-size:16px;flex-shrink:0;margin-top:1px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:14px;font-size:11px;font-weight:500;background:#f0f0f0;color:#555;}

:root{--accent:#3C3489;--accent-l:#EEEDFE;}
</style>
</head>
<body>
<nav class="top-nav">
  <a href="index.html" class="top-nav-back" aria-label="Accueil"><i class="ti ti-arrow-left"></i></a>
  <span class="top-nav-title">1 · Profil décisionnel</span>
</nav>
<div class="page-body">

<div class="step-nav" id="snav"></div>
<div id="p1" style="display:block;">
  <span class="slabel">Étape 1 · Identité</span>
  <div class="field"><label>Prénom / Nom</label><input type="text" id="nom" placeholder="Ex. Marie Dupont"></div>
  <div class="field"><label>Contexte professionnel</label><input type="text" id="ctx" placeholder="Ex. Manager RH, secteur santé"></div>
  <div class="field"><label>Type de décisions le plus fréquent</label><div class="pills" id="pg-type"></div></div>
  <div class="btn-row"><button type="button" class="btn pri" onclick="go(2)">Suivant →</button></div>
</div>
<div id="p2" style="display:none;">
  <span class="slabel">Étape 2 · Mon cocktail décisionnel</span>
  <div class="card">
    <div class="field"><label>Raison — <strong id="vr">5</strong>/10</label><input type="range" min="0" max="10" value="5" id="sr" oninput="uS()"></div>
    <div class="field"><label>Émotion — <strong id="ve">5</strong>/10</label><input type="range" min="0" max="10" value="5" id="se" oninput="uS()"></div>
    <div class="field"><label>Intuition — <strong id="vi">5</strong>/10</label><input type="range" min="0" max="10" value="5" id="si" oninput="uS()"></div>
    <div id="dom" style="font-size:13px;color:var(--accent);margin-top:4px;min-height:20px;"></div>
  </div>
  <div class="field"><label>Mon style préférentiel</label><div class="pills" id="pg-style"></div></div>
  <div class="btn-row">
    <button type="button" class="btn sec" onclick="go(1)">← Retour</button>
    <button type="button" class="btn pri" onclick="go(3)">Suivant →</button>
  </div>
</div>
<div id="p3" style="display:none;">
  <span class="slabel">Étape 3 · Forces & angle mort</span>
  <div class="field"><label>Ma principale force décisionnelle</label><div class="pills" id="pg-force"></div></div>
  <div class="field"><label>Mon angle mort principal</label><textarea id="angle" placeholder="Ex. Je tarde à décider quand l'information est incomplète."></textarea></div>
  <div class="field"><label>Ma stratégie d'atténuation</label><textarea id="strat" placeholder="Ex. Je me fixe une deadline interne."></textarea></div>
  <div class="field"><label>Un élément qui ne se retrouve pas dans votre profil</label><textarea id="horsprofil" placeholder="Ex. Une nuance, une situation particulière ou une facette non représentée par les choix proposés."></textarea></div>
  <div class="btn-row">
    <button type="button" class="btn sec" onclick="go(2)">← Retour</button>
    <button type="button" class="btn pri" onclick="go(4)">Générer ma carte →</button>
  </div>
</div>
<div id="p4" style="display:none;">
  <div id="carte"></div>
  <div class="btn-row" style="margin-top:16px;">
    <button type="button" class="btn sec" onclick="go(1)">← Recommencer</button>
    <button type="button" class="btn pdf" onclick="doPrint(document.getElementById('carte').innerHTML)"><i class="ti ti-download"></i> PDF</button>
  </div>
</div>
</div>
<script>
const PRINT_CSS = `*{box-sizing:border-box;margin:0;padding:0;}body{font-family:system-ui,sans-serif;padding:1.5rem;color:#1a1a1a;}.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border:0.5px solid #e0e0e0;}.slabel{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#888;margin-bottom:6px;display:block;margin-top:10px;}.pill{padding:5px 10px;border-radius:14px;font-size:12px;font-weight:500;background:#EEEDFE;color:#3C3489;display:inline-block;}.pbar-wrap{margin-bottom:8px;}.pbar-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:3px;}.pbar-track{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;}.pbar-fill{height:100%;border-radius:3px;}.alert-box{border-radius:8px;padding:10px 12px;font-size:13px;display:flex;gap:8px;align-items:flex-start;background:#FAECE7;color:#712B13;}`;
function doPrint(content) {
  if(!content && document.getElementById('carte')){buildCarte();content=document.getElementById('carte').innerHTML;}
  if(!content){alert('Génère le livrable d\'abord.');return;}
  const w = window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + PRINT_CSS + '</style></head><body>' + content + '<scr' + 'ipt>window.onload=()=>window.print();</scr' + 'ipt></body></html>');
  w.document.close();
}

function go(n){
  if(n===4)buildCarte();
  ['p1', 'p2', 'p3', 'p4'].forEach(function(id,i){
    var el=document.getElementById(id);
    if(el)el.style.display=(i+1===n)?'block':'none';
  });
  snav(n);
  window.scrollTo(0,0);
}

const TYPES=['Opérationnelles','Stratégiques','RH / humaines','Techniques','Financières'];
const STYLES=['Analytique','Intuitif','Consensuel','Directif','Conceptuel'];
const FORCES=['Décide vite sous pression','Intègre bien les données','Consulte avant de choisir','Voit les risques tôt','Anticipe les impacts humains'];
const SEL={type:'',style:'',force:''};

function pills(id,opts,key){
  var w=document.getElementById(id);
  if(!w)return;
  w.innerHTML='';
  opts.forEach(function(o){
    var b=document.createElement('button');
    b.type='button';
    b.className='pill'+(SEL[key]===o?' sel':'');
    b.textContent=o;
    b.onclick=function(){SEL[key]=o;pills(id,opts,key);};
    w.appendChild(b);
  });
}
pills('pg-type',TYPES,'type');
pills('pg-style',STYLES,'style');
pills('pg-force',FORCES,'force');

function uS(){
  var r=+document.getElementById('sr').value;
  var e=+document.getElementById('se').value;
  var i=+document.getElementById('si').value;
  document.getElementById('vr').textContent=r;
  document.getElementById('ve').textContent=e;
  document.getElementById('vi').textContent=i;
  var m=Math.max(r,e,i);
  document.getElementById('dom').textContent=m===r?'Dominante : Raison':m===e?'Dominante : Émotion':'Dominante : Intuition';
}
uS();

function snav(cur){
  var n=document.getElementById('snav');
  n.innerHTML='';
  ['Identité','Cocktail','Forces','Carte'].forEach(function(l,i){
    if(i>0){var line=document.createElement('div');line.className='step-line';n.appendChild(line);}
    var d=document.createElement('div');
    d.className='step-dot'+(i+1===cur?' active':i+1<cur?' done':'');
    d.textContent=i+1;
    n.appendChild(d);
  });
}

function bar(l,v,c){
  return '<div class="pbar-wrap"><div class="pbar-row"><span>'+l+'</span><span style="color:'+c+';font-weight:700;">'+v+'/10</span></div><div class="pbar-track"><div class="pbar-fill" style="width:'+(v*10)+'%;background:'+c+';"></div></div></div>';
}

function buildCarte(){
  var nom=document.getElementById('nom').value||'—';
  var ctx=document.getElementById('ctx').value||'—';
  var angle=document.getElementById('angle').value||'—';
  var strat=document.getElementById('strat').value||'—';
  var horsprofil=document.getElementById('horsprofil').value||'';
  var r=+document.getElementById('sr').value;
  var e=+document.getElementById('se').value;
  var i=+document.getElementById('si').value;
  var p=nom.trim().split(' ').filter(function(x){return x;});
  var ini=p.length<2?(p[0]?p[0][0].toUpperCase():'?'):(p[0][0]+p[p.length-1][0]).toUpperCase();
  document.getElementById('carte').innerHTML=
    '<div style="background:#EEEDFE;border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">'
    +'<div style="width:40px;height:40px;border-radius:50%;background:#3C3489;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;">'+ini+'</div>'
    +'<div><div style="font-size:16px;font-weight:600;color:#3C3489;">'+nom+'</div><div style="font-size:12px;color:#888;">'+ctx+'</div></div></div>'
    +'<div class="card"><div class="slabel" style="margin-top:0;">Type de décisions</div>'
    +'<span class="pill">'+(SEL.type||'—')+'</span></div>'
    +'<div class="card"><div class="slabel" style="margin-top:0;">Cocktail décisionnel</div>'
    +bar('Raison',r,'#3C3489')+bar('Émotion',e,'#085041')+bar('Intuition',i,'#633806')+'</div>'
    +'<div class="card"><div class="slabel" style="margin-top:0;">Style · Force</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'
    +'<span class="pill" style="background:#EEEDFE;color:#3C3489;">'+(SEL.style||'—')+'</span>'
    +'<span class="pill" style="background:#E1F5EE;color:#085041;">'+(SEL.force||'—')+'</span>'
    +'</div></div>'
    +'<div class="card"><div class="slabel" style="margin-top:0;">Angle mort</div>'
    +'<div class="alert-box"><span>&#9888; '+angle+'</span></div>'
    +'<div class="slabel">Stratégie</div>'
    +'<div style="font-size:13px;color:#555;line-height:1.5;">'+strat+'</div>'
    +(horsprofil?'<div class="slabel">Élément complémentaire</div><div style="font-size:13px;color:#555;line-height:1.5;">'+horsprofil+'</div>':'')+'</div>';
}
snav(1);
go(1);

</script>
</body>
</html>
